<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cmtrhn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --accent2:  #3fb950;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.45);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 700;
      margin: 0 auto 1.25rem;
      letter-spacing: -1px;
      color: #fff;
      user-select: none;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: .35rem;
      letter-spacing: -.5px;
    }

    .handle {
      color: var(--accent);
      font-size: .95rem;
      margin-bottom: 1.25rem;
    }

    .bio {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: .75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .5rem 1.1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: .875rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color .2s, background .2s, color .2s;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88,166,255,.08);
    }

    .btn svg { flex-shrink: 0; }

    footer {
      margin-top: 2.5rem;
      color: var(--muted);
      font-size: .8rem;
    }

    footer a { color: var(--muted); text-decoration: underline; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="card">
    <div class="avatar">cm</div>

    <h1>cmtrhn</h1>
    <p class="handle">@cmtrhn</p>

    <p class="bio">
      Welcome to my personal page.<br>
      Building things on the web.
    </p>

    <div class="links">
      <a class="btn" href="https://github.com/cmtrhn" target="_blank" rel="noopener noreferrer">
        <!-- GitHub icon -->
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38
                   0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                   -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87
                   2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
                   0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
                   0 0 .67-.21 2.2.82a7.65 7.65 0 012 0c1.53-1.04 2.2-.82
                   2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82
                   2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54
                   1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01
                   8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
    </div>
  </div>

  <footer>
    <p>Made with ♥ · <a href="https://pages.github.com/" target="_blank" rel="noopener noreferrer">GitHub Pages</a></p>
  </footer>

</body>
</html>
